name: Release

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to build (e.g. v0.1.0)"
                required: true

permissions:
    contents: write

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        name: Build and publish
        runs-on: macos-15
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.tag || github.ref }}

            - uses: jdx/mise-action@v4

            - name: Add universal macOS targets
              run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build and sign
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
              run: pnpm tauri build --target universal-apple-darwin -- --locked

            - name: Verify signed bundle
              run: |
                  BUNDLE=src-tauri/target/universal-apple-darwin/release/bundle/macos
                  test -d "${BUNDLE}/Owlbox.app"         || { echo "Missing Owlbox.app"; exit 1; }
                  test -f "${BUNDLE}/Owlbox.app.tar.gz"  || { echo "Missing tarball"; exit 1; }
                  test -f "${BUNDLE}/Owlbox.app.tar.gz.sig" || { echo "Missing signature — signing likely failed"; exit 1; }
                  echo "Bundle verified."

            - name: Publish release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ inputs.tag || github.ref_name }}"
                  BUNDLE=src-tauri/target/universal-apple-darwin/release/bundle/macos
                  DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)

                  if gh release view "${TAG}" >/dev/null 2>&1; then
                      gh release edit "${TAG}" \
                          --title "Owlbox ${TAG}" \
                          --notes "Auto-generated release. See commit history for changes." \
                          --draft
                  else
                      gh release create "${TAG}" \
                          --title "Owlbox ${TAG}" \
                          --notes "Auto-generated release. See commit history for changes." \
                          --draft
                  fi

                  cp "${BUNDLE}/Owlbox.app.tar.gz" Owlbox_universal.app.tar.gz
                  gh release upload "${TAG}" \
                      Owlbox_universal.app.tar.gz \
                      "${DMG}" \
                      --clobber

            - name: Upload updater JSON
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ inputs.tag || github.ref_name }}"
                  BUNDLE=src-tauri/target/universal-apple-darwin/release/bundle/macos
                  SIG=$(cat "${BUNDLE}/Owlbox.app.tar.gz.sig")
                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
                  DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  URL="https://github.com/mgxv/owlbox/releases/download/${TAG}/Owlbox_universal.app.tar.gz"
                  jq -n \
                    --arg version "$VERSION" \
                    --arg date "$DATE" \
                    --arg sig "$SIG" \
                    --arg url "$URL" \
                    '{version: $version, notes: "", pub_date: $date, platforms: {"darwin-universal": {signature: $sig, url: $url}}}' \
                    > latest.json
                  gh release upload "${TAG}" latest.json --clobber
