name: Release

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to build (e.g. v0.1.0)"
                required: true

permissions:
    contents: write

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        name: Build and publish
        runs-on: macos-15
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.tag || github.ref }}

            - name: Verify version consistency
              run: |
                  set -euo pipefail
                  TAG="${{ inputs.tag || github.ref_name }}"
                  V_TAURI=$(jq -r '.version' src-tauri/tauri.conf.json)
                  V_PKG=$(jq -r '.version' package.json)
                  V_CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
                  echo "tauri.conf.json : $V_TAURI"
                  echo "package.json    : $V_PKG"
                  echo "Cargo.toml      : $V_CARGO"
                  echo "git tag         : $TAG"
                  if [[ "$V_TAURI" != "$V_PKG" ]] || [[ "$V_TAURI" != "$V_CARGO" ]]; then
                      echo "ERROR: version mismatch across manifests — run scripts/bump-version.sh" >&2
                      exit 1
                  fi
                  if [[ "$TAG" != "v${V_TAURI}" ]]; then
                      echo "ERROR: git tag ($TAG) does not match manifest version (v${V_TAURI})" >&2
                      exit 1
                  fi
                  echo "All versions consistent: $V_TAURI"

            - uses: jdx/mise-action@v4

            - name: Add macOS targets
              run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build aarch64
              env:
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
              run: pnpm tauri build --target aarch64-apple-darwin -- --locked

            - name: Build x86_64
              env:
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
              run: pnpm tauri build --target x86_64-apple-darwin -- --locked

            - name: Normalize ad-hoc signatures and recreate DMGs
              run: |
                  set -euo pipefail
                  for ARCH in aarch64-apple-darwin x86_64-apple-darwin; do
                      APP="src-tauri/target/${ARCH}/release/bundle/macos/Owlbox-Genesis.app"
                      DMG=$(find "src-tauri/target/${ARCH}/release/bundle/dmg" -name "*.dmg" | head -1)

                      codesign --deep --force --sign - "$APP"

                      TMPDIR=$(mktemp -d)
                      cp -r "$APP" "$TMPDIR/"
                      ln -s /Applications "$TMPDIR/Applications"
                      hdiutil create -volname "Owlbox-Genesis" -srcfolder "$TMPDIR" -ov -format UDZO "$DMG"
                      rm -rf "$TMPDIR"
                  done

            - name: Create and sign updater bundles
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              run: |
                  for ARCH in aarch64-apple-darwin x86_64-apple-darwin; do
                      BUNDLE="src-tauri/target/${ARCH}/release/bundle/macos"
                      tar -czf "${BUNDLE}/Owlbox-Genesis.app.tar.gz" -C "${BUNDLE}" Owlbox-Genesis.app
                      pnpm tauri signer sign "${BUNDLE}/Owlbox-Genesis.app.tar.gz" \
                          -k "$TAURI_SIGNING_PRIVATE_KEY" \
                          -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
                  done

            - name: Verify signed bundles
              run: |
                  for ARCH in aarch64-apple-darwin x86_64-apple-darwin; do
                      BUNDLE="src-tauri/target/${ARCH}/release/bundle/macos"
                      test -d "${BUNDLE}/Owlbox-Genesis.app"            || { echo "Missing ${ARCH} app bundle"; exit 1; }
                      test -f "${BUNDLE}/Owlbox-Genesis.app.tar.gz"     || { echo "Missing ${ARCH} tarball"; exit 1; }
                      test -f "${BUNDLE}/Owlbox-Genesis.app.tar.gz.sig" || { echo "Missing ${ARCH} signature"; exit 1; }
                  done
                  echo "All bundles verified."

            - name: Publish release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ inputs.tag || github.ref_name }}"

                  if gh release view "${TAG}" >/dev/null 2>&1; then
                      gh release edit "${TAG}" \
                          --title "Owlbox-Genesis ${TAG}" \
                          --notes "Auto-generated release. See commit history for changes." \
                          --draft
                  else
                      gh release create "${TAG}" \
                          --title "Owlbox-Genesis ${TAG}" \
                          --notes "Auto-generated release. See commit history for changes." \
                          --draft
                  fi

                  cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Owlbox-Genesis.app.tar.gz Owlbox-Genesis_aarch64.app.tar.gz
                  cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Owlbox-Genesis.app.tar.gz Owlbox-Genesis_x64.app.tar.gz
                  DMG_AARCH64=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
                  DMG_X86_64=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)

                  gh release upload "${TAG}" \
                      Owlbox-Genesis_aarch64.app.tar.gz \
                      Owlbox-Genesis_x64.app.tar.gz \
                      "${DMG_AARCH64}" \
                      "${DMG_X86_64}" \
                      --clobber

            - name: Upload updater JSON
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ inputs.tag || github.ref_name }}"
                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
                  DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  SIG_AARCH64=$(cat src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Owlbox-Genesis.app.tar.gz.sig)
                  SIG_X86_64=$(cat src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Owlbox-Genesis.app.tar.gz.sig)
                  URL_AARCH64="https://github.com/mgxv/owlbox-genesis/releases/download/${TAG}/Owlbox-Genesis_aarch64.app.tar.gz"
                  URL_X86_64="https://github.com/mgxv/owlbox-genesis/releases/download/${TAG}/Owlbox-Genesis_x64.app.tar.gz"
                  jq -n \
                    --arg version "$VERSION" \
                    --arg date "$DATE" \
                    --arg sig_aarch64 "$SIG_AARCH64" \
                    --arg sig_x86_64 "$SIG_X86_64" \
                    --arg url_aarch64 "$URL_AARCH64" \
                    --arg url_x86_64 "$URL_X86_64" \
                    '{version: $version, notes: "", pub_date: $date, platforms: {"darwin-aarch64": {signature: $sig_aarch64, url: $url_aarch64}, "darwin-x86_64": {signature: $sig_x86_64, url: $url_x86_64}}}' \
                    > latest.json
                  gh release upload "${TAG}" latest.json --clobber
