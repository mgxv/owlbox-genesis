name: Release

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to build (e.g. v0.1.0)"
                required: true

permissions:
    contents: write

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        name: Build and publish
        runs-on: macos-15
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.tag || github.ref }}

            - uses: jdx/mise-action@v4

            - name: Add universal macOS targets
              run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build, sign, and publish
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
              with:
                  tagName: ${{ inputs.tag || github.ref_name }}
                  releaseName: "Owlbox ${{ inputs.tag || github.ref_name }}"
                  releaseBody: "Auto-generated release. See commit history for changes."
                  releaseDraft: true
                  prerelease: false
                  includeUpdaterJson: false
                  args: --target universal-apple-darwin -- --locked

            - name: Upload updater JSON
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ inputs.tag || github.ref_name }}"
                  BUNDLE=src-tauri/target/universal-apple-darwin/release/bundle/macos
                  SIG_FILE="${BUNDLE}/Owlbox.app.tar.gz.sig"
                  if [ ! -f "$SIG_FILE" ]; then
                    echo "Error: $SIG_FILE not found — signing likely failed"
                    exit 1
                  fi
                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
                  SIG=$(cat "$SIG_FILE")
                  DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  URL="https://github.com/mgxv/owlbox/releases/download/${TAG}/Owlbox_universal.app.tar.gz"
                  jq -n \
                    --arg version "$VERSION" \
                    --arg date "$DATE" \
                    --arg sig "$SIG" \
                    --arg url "$URL" \
                    '{version: $version, notes: "", pub_date: $date, platforms: {"darwin-universal": {signature: $sig, url: $url}}}' \
                    > latest.json
                  gh release upload "${TAG}" latest.json --clobber
